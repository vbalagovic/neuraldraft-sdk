name: Publish to npm

# Triggered when:
#  - a `v*` tag is pushed (`git tag v0.3.0 && git push origin v0.3.0`)
#  - a push to `main` changes the version in package.json
#  - manual dispatch from the Actions tab
#
# Either way, the workflow tests + builds before publishing, and skips if the
# tag/version already exists on the registry (so re-runs are idempotent).

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Read package version
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Skip if already on registry
        id: check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already on npm — nothing to do."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
